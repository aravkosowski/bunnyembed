<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ping Pong Game</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    font-family: Arial, sans-serif;
  }

  canvas {
    background: #000;
    border: 4px solid #fff;
  }
</style>
</head>
<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Game objects
let player = { x: 20, y: 200, width: 15, height: 100, speed: 6 };
let ai = { x: 765, y: 200, width: 15, height: 100, speed: 4 };
let ball = { x: 400, y: 250, size: 12, speedX: 5, speedY: 5 };

let playerScore = 0;
let aiScore = 0;

// Draw paddle
function drawPaddle(p) {
  ctx.fillStyle = "white";
  ctx.fillRect(p.x, p.y, p.width, p.height);
}

// Draw ball
function drawBall() {
  ctx.fillStyle = "white";
  ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
}

// Draw score
function drawScore() {
  ctx.font = "30px Arial";
  ctx.fillText(playerScore, 350, 40);
  ctx.fillText(aiScore, 430, 40);
}

// Move ball
function moveBall() {
  ball.x += ball.speedX;
  ball.y += ball.speedY;

  // Bounce top/bottom
  if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {
    ball.speedY *= -1;
  }

  // Player paddle collision
  if (
    ball.x <= player.x + player.width &&
    ball.y + ball.size >= player.y &&
    ball.y <= player.y + player.height
  ) {
    ball.speedX *= -1;
  }

  // AI paddle collision
  if (
    ball.x + ball.size >= ai.x &&
    ball.y + ball.size >= ai.y &&
    ball.y <= ai.y + ai.height
  ) {
    ball.speedX *= -1;
  }

  // Score left/right
  if (ball.x < 0) {
    aiScore++;
    resetBall();
  }
  if (ball.x > canvas.width) {
    playerScore++;
    resetBall();
  }
}

// Reset ball to center
function resetBall() {
  ball.x = 400;
  ball.y = 250;
  ball.speedX *= -1;
}

// AI movement
function moveAI() {
  if (ai.y + ai.height / 2 < ball.y) ai.y += ai.speed;
  else ai.y -= ai.speed;
}

// Player movement
let up = false;
let down = false;

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") up = true;
  if (e.key === "ArrowDown") down = true;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowUp") up = false;
  if (e.key === "ArrowDown") down = false;
});

function movePlayer() {
  if (up && player.y > 0) player.y -= player.speed;
  if (down && player.y + player.height < canvas.height) player.y += player.speed;
}

// Game loop
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  movePlayer();
  moveAI();
  moveBall();

  drawPaddle(player);
  drawPaddle(ai);
  drawBall();
  drawScore();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
